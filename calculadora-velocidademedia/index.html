<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Velocidade Média</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="conteiner-principal">

        <div class="campo-input">
            <label for="distancia">Digite a distância percorrida:</label>
            <input type="number" name="distancia" id="distancia" placeholder="Metros">
        </div>

        <div class="campo-input">
            <label for="tempo">Digite tempo necessário:</label>
            <input type="number" name="tempo" id="tempo" placeholder="Segundos">
        </div>

        <button id="btn" onclick="verificar()">Resultado</button>

        <div id="resultado">

        </div>

    </div>

    <script src="calcular.js"></script>
    <script src="abrir.js"></script>
    
</body>
</html>
